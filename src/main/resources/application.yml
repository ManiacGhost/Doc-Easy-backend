spring:
  application:
    name: chatapp

  # PostgreSQL Database Configuration
  datasource:
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: "${JPA_DDL_AUTO:update}"
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Multipart limits
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Redis Configuration
  data:
    redis:
      host: "${REDIS_HOST}"
      port: "${REDIS_PORT}"

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 600000

  # Email Configuration (Brevo/Sendinblue SMTP)
  mail:
    host: "${MAIL_HOST}"
    port: "${MAIL_PORT}"
    username: "${MAIL_USERNAME}"
    password: "${MAIL_PASSWORD}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Server Configuration
server:
  port: "${SERVER_PORT}"

# App settings
app:
  storage:
    path: "${STORAGE_PATH:uploads}"

  mail:
    from: "${MAIL_FROM}"

  # JWT Configuration
  jwt:
    secret: "${JWT_SECRET}"
    expiration: "${JWT_EXPIRATION}"

  # OTP Configuration
  otp:
    expiration: "${OTP_EXPIRATION}"

  # AWS S3 Configuration
  aws:
    access-key: "${AWS_ACCESS_KEY}"
    secret-key: "${AWS_SECRET_KEY}"
    region: "${AWS_REGION}"
    bucket-name: "${AWS_BUCKET_NAME}"

  # Cloudinary Configuration
  cloudinary:
    cloud-name: "${CLOUDINARY_CLOUD_NAME}"
    api-key: "${CLOUDINARY_API_KEY}"
    api-secret: "${CLOUDINARY_API_SECRET}"
    upload-preset: "${CLOUDINARY_UPLOAD_PRESET}"

  ai:
    # OpenAI Configuration
    openai:
      base-url: "${OPENAI_BASE_URL:https://api.openai.com}"
      chat-endpoint: "${OPENAI_CHAT_ENDPOINT:/v1/chat/completions}"
      model: "${OPENAI_MODEL:gpt-4o-mini}"
      vision-model: "${OPENAI_VISION_MODEL:gpt-4o}"
      api-key: "${OPENAI_API_KEY}"

    # NVIDIA AI Foundation Models
    nvidia:
      api-key: "${NVIDIA_API_KEY}"
      text-model: "${NVIDIA_TEXT_MODEL:meta/llama-3.1-8b-instruct}"
      vision-model: "${NVIDIA_VISION_MODEL:meta/llama-3.2-11b-vision-instruct}"

    # Deepgram ASR
    deepgram:
      api-key: "${DEEPGRAM_API_KEY}"
      model: "${DEEPGRAM_MODEL:nova-2}"

    # Gemini API Configuration
    gemini:
      api-key: "${GEMINI_API_KEY}"
      model: "${GEMINI_MODEL:gemini-2.5-flash}"

